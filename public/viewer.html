<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Tracking — GPS Tracker</title>
  <meta name="description" content="View real-time GPS location tracking">
  <meta name="theme-color" content="#6c5ce7">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="viewer-mode">
  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
    <div class="live-badge" id="liveBadge" style="display:none">
      <span class="live-dot"></span>
      LIVE
    </div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Viewer Info Panel -->
  <div class="viewer-info-panel" id="viewerInfoPanel">
    <div class="viewer-stats">
      <div class="viewer-stat">
        <div class="stat-icon speed-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div>
          <div class="stat-value" id="speedValue">0.0</div>
          <div class="stat-label">km/h</div>
        </div>
      </div>
      <div class="viewer-stat">
        <div class="stat-icon distance-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <div>
          <div class="stat-value" id="distanceValue">0.00</div>
          <div class="stat-label">km</div>
        </div>
      </div>
      <div class="viewer-stat">
        <div class="stat-icon time-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div>
          <div class="stat-value" id="durationValue">00:00</div>
          <div class="stat-label">duration</div>
        </div>
      </div>
      <div class="viewer-stat">
        <div class="stat-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="16 12 12 8 8 12"/><line x1="12" y1="16" x2="12" y2="8"/></svg>
        </div>
        <div>
          <div class="stat-value" id="lastUpdateValue">--</div>
          <div class="stat-label">last update</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Center Button -->
  <button class="center-btn" id="centerBtn" onclick="centerOnTracker()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
    </svg>
  </button>

  <!-- Tracking Ended Overlay -->
  <div class="tracking-ended-overlay" id="endedOverlay" style="display:none">
    <div class="ended-card">
      <div class="ended-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <h2>Tracking Ended</h2>
      <p>The tracker has stopped sharing their location</p>
      <div class="ended-stats">
        <div><strong id="endDistance">0</strong><span>km traveled</span></div>
        <div><strong id="endDuration">0:00</strong><span>duration</span></div>
        <div><strong id="endPoints">0</strong><span>points</span></div>
      </div>
    </div>
  </div>

  <!-- Error Overlay -->
  <div class="error-overlay" id="errorOverlay" style="display:none">
    <div class="error-card">
      <div class="error-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <h2>Session Not Found</h2>
      <p id="errorMessage">This tracking session may have expired or the link is invalid.</p>
      <a href="/" class="start-tracking-link">Start Your Own Tracking →</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/viewer.js"></script>
</body>
</html>
