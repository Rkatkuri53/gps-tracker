<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GPS Tracker — Real-Time Location Sharing</title>
  <meta name="description" content="Track and share your real-time GPS location with anyone. Installable on any phone.">
  <meta name="theme-color" content="#6c5ce7">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Ready to track</span>
    <div class="viewer-badge" id="viewerBadge" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span id="viewerCount">0</span>
    </div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Stats Panel -->
  <div class="stats-panel" id="statsPanel">
    <div class="stat-card">
      <div class="stat-icon speed-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div class="stat-info">
        <div class="stat-value" id="speedValue">0.0</div>
        <div class="stat-label">km/h</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon distance-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="stat-info">
        <div class="stat-value" id="distanceValue">0.00</div>
        <div class="stat-label">km</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon time-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="stat-info">
        <div class="stat-value" id="durationValue">00:00</div>
        <div class="stat-label">duration</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon accuracy-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      </div>
      <div class="stat-info">
        <div class="stat-value" id="accuracyValue">--</div>
        <div class="stat-label">meters</div>
      </div>
    </div>
  </div>

  <!-- Share Panel -->
  <div class="share-panel" id="sharePanel" style="display:none">
    <div class="share-panel-header">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      <span>Share Tracking Link</span>
    </div>
    <div class="share-link-container">
      <input type="text" id="shareLink" readonly class="share-link-input">
      <button id="copyBtn" class="copy-btn" onclick="copyShareLink()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>Copy</span>
      </button>
    </div>
    <p class="share-hint">Anyone with this link can see your live location</p>
  </div>

  <!-- Control Button -->
  <div class="control-container">
    <button id="trackBtn" class="track-btn" onclick="toggleTracking()">
      <div class="btn-content" id="btnContent">
        <div class="btn-icon" id="btnIcon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <span id="btnText">Start Tracking</span>
      </div>
      <div class="btn-pulse" id="btnPulse"></div>
    </button>
  </div>

  <!-- Settings Toggle -->
  <button class="settings-toggle" id="settingsToggle" onclick="toggleSettings()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>Settings</h3>
      <button class="close-settings" onclick="toggleSettings()">&times;</button>
    </div>
    <div class="setting-item">
      <label>Update Interval</label>
      <select id="updateInterval" onchange="updateSettings()">
        <option value="1000">1 second (High Battery)</option>
        <option value="3000" selected>3 seconds (Balanced)</option>
        <option value="5000">5 seconds (Battery Saver)</option>
        <option value="10000">10 seconds (Low Battery)</option>
      </select>
    </div>
    <div class="setting-item">
      <label>GPS Accuracy</label>
      <select id="gpsAccuracy" onchange="updateSettings()">
        <option value="true" selected>High Accuracy</option>
        <option value="false">Low Power</option>
      </select>
    </div>
    <div class="setting-item">
      <label class="toggle-label">
        <span>Auto-center map</span>
        <input type="checkbox" id="autoCenter" checked onchange="updateSettings()">
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-item">
      <label class="toggle-label">
        <span>Show trail</span>
        <input type="checkbox" id="showTrail" checked onchange="updateSettings()">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <span id="toastMessage"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/tracker.js"></script>
</body>
</html>
